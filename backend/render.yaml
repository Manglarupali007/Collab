# render.yaml - Root folder mein rakho
services:
  - type: web
    name: nexus-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://nexus-frontend.vercel.app
      - key: PORT
        value: 5000
    plan: free